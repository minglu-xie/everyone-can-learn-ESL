name: Release Enjoy App
on: workflow_dispatch

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, macos-15, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install

      - name: Install Apple certificate
        if: contains(matrix.os, 'macos')
        env:
          MACOS_CERTIFICATE_APPLICATION_BASE64: ${{ secrets.MACOS_CERTIFICATE_APPLICATION_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: ./enjoy/scripts/add-macos-cert.sh

      - name: Build installers
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: yarn enjoy:make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Enjoy-${{ runner.os }}-${{ matrix.os == 'macos-15' && 'arm64' || 'x64' }}-build-${{ github.ref_name }}
          path: |
            enjoy/out/make/**/*.deb
            enjoy/out/make/**/*.rpm
            enjoy/out/make/**/*.exe
            enjoy/out/make/**/*.dmg
